plugins {
    id 'application'
}

dependencies {
    implementation project(':lib-core')
    implementation project(':lib-net')
    implementation project(':lib-persistence')
}

application {
    mainClass = 'rhizome.node.RhizomeNode'
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()
}
